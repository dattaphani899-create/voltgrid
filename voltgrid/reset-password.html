<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltGrid — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1877F2;
    --primary-light: #E7F0FD;
    --primary-hover: #166FE5;
    --green: #25D366;
    --green-light: #E9FBF0;
    --green-dark: #128C7E;
    --red: #FA383E;
    --red-light: #FDECEA;
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text: #050505;
    --text-2: #3E4042;
    --muted: #65676B;
    --border: #E4E6EB;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; font-size: 14px;
  }
  .logo { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; margin-bottom: 6px; text-align: center; }
  .logo span { color: var(--green-dark); }
  .tagline { font-size: 13px; font-weight: 500; color: var(--muted); text-align: center; margin-bottom: 32px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px 40px; width: 100%; max-width: 420px;
    box-shadow: var(--shadow-md); animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .card-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .card-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 7px; }
  .hint-text { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .input-wrap { position: relative; }
  .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; opacity: 0.6; }
  input[type="password"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 40px 11px 38px; font-family: 'Inter', sans-serif; font-size: 14px;
    color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="password"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(24,119,242,0.12); background: #fff; }
  input::placeholder { color: var(--muted); }
  .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 2px; line-height: 1; }
  .toggle-pw:hover { color: var(--text); }
  .error-msg { display: none; background: var(--red-light); border: 1px solid rgba(250,56,62,0.25); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 18px; align-items: center; gap: 8px; font-weight: 500; }
  .error-msg.show { display: flex; }
  .success-msg { display: none; background: var(--green-light); border: 1px solid rgba(37,211,102,0.25); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: var(--green-dark); margin-bottom: 18px; font-weight: 500; line-height: 1.6; }
  .success-msg.show { display: block; }
  .invalid-msg { display: none; background: var(--red-light); border: 1px solid rgba(250,56,62,0.25); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: var(--red); font-weight: 500; line-height: 1.6; }
  .invalid-msg.show { display: block; }
  .btn {
    width: 100%; background: var(--primary); color: #fff; font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 14px; padding: 13px; border: none; border-radius: 10px;
    cursor: pointer; transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(24,119,242,0.25); margin-top: 6px; position: relative;
  }
  .btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(24,119,242,0.35); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .spinner { display: none; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { opacity: 0.75; }
  .back-link { margin-top: 24px; text-align: center; font-size: 13px; color: var(--muted); }
  .back-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .back-link a:hover { text-decoration: underline; }

  /* Password strength bar */
  .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 11px; margin-top: 4px; font-weight: 600; }
</style>
</head>
<body>

<div class="logo">Volt<span>Grid</span></div>
<div class="tagline">Charge Point Operator Platform</div>

<div class="card">
  <div class="card-header">
    <div class="card-icon">🔒</div>
    <div>
      <div class="card-title">Set New Password</div>
      <div class="card-sub">Choose a strong password</div>
    </div>
  </div>

  <!-- Shown if token is missing/expired -->
  <div class="invalid-msg" id="invalid-msg">
    ⚠️ &nbsp;<strong>Invalid or expired link.</strong><br>
    Please <a href="forgot-password.html" style="color:var(--red);font-weight:700;">request a new reset link</a>.
  </div>

  <div class="error-msg" id="error-msg"><span>⚠️</span><span id="error-text"></span></div>
  <div class="success-msg" id="success-msg"></div>

  <form id="reset-form">
    <div class="form-group">
      <label for="password">New Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter new password" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" id="toggle-pw1">👁️</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
      <div class="hint-text">Minimum 6 characters</div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="confirm" placeholder="Re-enter new password" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" id="toggle-pw2">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn-submit">
      <span class="btn-text">Update Password</span>
      <span class="spinner"></span>
    </button>
  </form>
</div>

<div class="back-link">← <a href="login.html">Back to sign in</a></div>

<script>
  const API_BASE = ['localhost', '127.0.0.1'].includes(location.hostname)
    ? 'http://localhost:3000'
    : 'https://voltgrid-api-q2sf.onrender.com';

  // Extract token from URL
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('invalid-msg').classList.add('show');
    document.getElementById('reset-form').style.display = 'none';
  }

  // Password toggle
  function setupToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener('click', () => {
      const inp = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    });
  }
  setupToggle('toggle-pw1', 'password');
  setupToggle('toggle-pw2', 'confirm');

  // Password strength
  document.getElementById('password').addEventListener('input', (e) => {
    const val = e.target.value;
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let strength = 0;
    if (val.length >= 6) strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
    if (/\d/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
      { w: '0%',   color: 'transparent', text: '' },
      { w: '25%',  color: '#FA383E',     text: 'Weak' },
      { w: '50%',  color: '#FFA500',     text: 'Fair' },
      { w: '75%',  color: '#1877F2',     text: 'Good' },
      { w: '100%', color: '#25D366',     text: 'Strong' },
    ];
    const lvl = levels[Math.min(strength, 4)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  });

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('btn-submit');

    document.getElementById('error-msg').classList.remove('show');

    if (password !== confirm) {
      document.getElementById('error-text').textContent = 'Passwords do not match.';
      document.getElementById('error-msg').classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/api/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-msg').innerHTML =
          `✅ &nbsp;<strong>Password updated!</strong><br>
           You can now <a href="login.html" style="color:var(--green-dark);font-weight:700;">sign in</a> with your new password.`;
        document.getElementById('success-msg').classList.add('show');
      } else {
        document.getElementById('error-text').textContent = data.error || 'Something went wrong.';
        document.getElementById('error-msg').classList.add('show');
        // If token is invalid/expired, show the invalid banner
        if (res.status === 400 && data.error && data.error.includes('expired')) {
          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('invalid-msg').classList.add('show');
        }
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    } catch (err) {
      document.getElementById('error-text').textContent = 'Cannot connect to server.';
      document.getElementById('error-msg').classList.add('show');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
