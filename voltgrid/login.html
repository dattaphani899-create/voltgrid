<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltGrid — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1877F2;
    --primary-light: #E7F0FD;
    --primary-hover: #166FE5;
    --green: #25D366;
    --green-light: #E9FBF0;
    --green-dark: #128C7E;
    --red: #FA383E;
    --red-light: #FDECEA;
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text: #050505;
    --text-2: #3E4042;
    --muted: #65676B;
    --border: #E4E6EB;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-size: 14px;
  }

  /* Logo */
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }
  .logo span { color: var(--green-dark); }

  .tagline {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 0.2px;
  }

  /* Card */
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-md);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card header */
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Form */
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 15px; pointer-events: none; opacity: 0.6;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 38px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(24,119,242,0.12);
    background: #fff;
  }
  input::placeholder { color: var(--muted); }

  /* Password toggle */
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 15px; padding: 2px;
    transition: color 0.15s;
    line-height: 1;
  }
  .toggle-pw:hover { color: var(--text); }

  /* Error */
  .error-msg {
    display: none;
    background: var(--red-light);
    border: 1px solid rgba(250,56,62,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 18px;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .error-msg.show { display: flex; }

  /* Submit button */
  .btn-login {
    width: 100%;
    background: var(--primary);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(24,119,242,0.25);
    margin-top: 6px;
    position: relative;
  }
  .btn-login:hover { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(24,119,242,0.35); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: none;
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { opacity: 0.75; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0 20px;
  }

  /* Demo credentials */
  .demo-hint {
    background: var(--green-light);
    border: 1px solid rgba(37,211,102,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--green-dark);
    line-height: 1.7;
  }
  .demo-hint .hint-label {
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .demo-hint .cred { font-weight: 600; color: var(--text-2); }

  /* Back link */
  .back-link {
    margin-top: 24px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
  .back-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .back-link a:hover { text-decoration: underline; }

  /* Live badge */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    border: 1px solid rgba(37,211,102,0.3);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 24px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
</style>
</head>
<body>

<div class="logo">Volt<span>Grid</span></div>
<div class="tagline">Charge Point Operator Platform</div>
<div class="live-badge"><span class="live-dot"></span> System Online</div>

<div class="login-card">

  <div class="card-header">
    <div class="card-icon">🔐</div>
    <div>
      <div class="card-title">Operator Sign In</div>
      <div class="card-sub">Access your control dashboard</div>
    </div>
  </div>

  <div class="error-msg" id="error-msg">
    <span>⚠️</span>
    <span id="error-text">Invalid username or password</span>
  </div>

  <form id="login-form" autocomplete="on">
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-login">
      <span class="btn-text">Sign in to Dashboard</span>
      <span class="spinner"></span>
    </button>
  </form>

  <hr class="divider">

  <div class="demo-hint">
    <div class="hint-label">🧪 Demo Credentials</div>
    Username: <span class="cred">admin</span> &nbsp;·&nbsp; Password: <span class="cred">admin123</span>
  </div>

</div>

<div class="back-link">← <a href="index.html">Back to public site</a></div>

<script>
  // Always talk to the Node backend on port 3000
  const API_BASE = 'https://voltgrid-api-q2sf.onrender.com';

  // If already logged in, go straight to dashboard
  const existing = localStorage.getItem('vg_token');
  if (existing) {
    fetch(`${API_BASE}/api/me`, { headers: { 'Authorization': 'Bearer ' + existing } })
      .then(r => { if (r.ok) window.location.replace('dashboard.html'); })
      .catch(() => {});
  }

  // Password visibility toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggle-pw');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁️';
    }
  });

  // Login form submission
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    errorMsg.classList.remove('show');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('vg_token', data.token);
        localStorage.setItem('vg_user', JSON.stringify({ username: data.username, role: data.role }));
        window.location.replace('dashboard.html');
      } else {
        showError(data.error || 'Invalid username or password');
      }
    } catch (err) {
      showError('Cannot connect to server. Is VoltGrid running?');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
</script>
</body>
</html>
