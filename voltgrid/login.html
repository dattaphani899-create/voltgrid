<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltGrid — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1877F2;
    --primary-light: #E7F0FD;
    --primary-hover: #166FE5;
    --green: #25D366;
    --green-light: #E9FBF0;
    --green-dark: #128C7E;
    --red: #FA383E;
    --red-light: #FDECEA;
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text: #050505;
    --text-2: #3E4042;
    --muted: #65676B;
    --border: #E4E6EB;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-size: 14px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }
  .logo span { color: var(--green-dark); }

  .tagline {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 0.2px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-md);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 15px; pointer-events: none; opacity: 0.6;
  }
  input[type="text"], input[type="password"], input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 38px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(24,119,242,0.12);
    background: #fff;
  }
  input::placeholder { color: var(--muted); }

  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 15px; padding: 2px;
    transition: color 0.15s;
    line-height: 1;
  }
  .toggle-pw:hover { color: var(--text); }

  .error-msg {
    display: none;
    background: var(--red-light);
    border: 1px solid rgba(250,56,62,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 18px;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .error-msg.show { display: flex; }

  /* OTP info banner */
  .otp-info {
    display: none;
    background: var(--green-light);
    border: 1px solid rgba(37,211,102,0.25);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--green-dark);
    margin-bottom: 18px;
    font-weight: 500;
    line-height: 1.5;
  }
  .otp-info.show { display: block; }

  /* OTP digit input */
  .otp-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    text-align: center;
    letter-spacing: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .otp-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(24,119,242,0.12);
    background: #fff;
  }

  .btn-login {
    width: 100%;
    background: var(--primary);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(24,119,242,0.25);
    margin-top: 6px;
    position: relative;
  }
  .btn-login:hover { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(24,119,242,0.35); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--primary);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--primary-light); }

  .spinner {
    display: none;
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { opacity: 0.75; }

  .back-link {
    margin-top: 24px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
  .back-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .back-link a:hover { text-decoration: underline; }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    border: 1px solid rgba(37,211,102,0.3);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 24px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  /* OTP timer */
  .otp-timer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  .otp-timer span { font-weight: 600; color: var(--text-2); }
</style>
</head>
<body>

<div class="logo">Volt<span>Grid</span></div>
<div class="tagline">Charge Point Operator Platform</div>
<div class="live-badge"><span class="live-dot"></span> System Online</div>

<div class="login-card">

  <div class="card-header">
    <div class="card-icon" id="card-icon">🔐</div>
    <div>
      <div class="card-title" id="card-title">Operator Sign In</div>
      <div class="card-sub" id="card-sub">Access your control dashboard</div>
    </div>
  </div>

  <div class="error-msg" id="error-msg">
    <span>⚠️</span>
    <span id="error-text">Invalid username or password</span>
  </div>

  <!-- Step 1: Credentials -->
  <form id="login-form" autocomplete="on">
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-login">
      <span class="btn-text">Continue</span>
      <span class="spinner"></span>
    </button>
    <div style="text-align:center;margin-top:14px;font-size:13px;">
      <a href="forgot-password.html" style="color:var(--muted);text-decoration:none;font-weight:500;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
    </div>
  </form>

  <!-- Step 2: OTP (hidden initially) -->
  <div id="otp-section" style="display:none;">
    <div class="otp-info show" id="otp-info">
      A 6-digit OTP has been sent to <strong id="otp-email-display"></strong>. Enter it below to complete sign-in.
    </div>

    <form id="otp-form">
      <div class="form-group">
        <label for="otp">One-Time Password</label>
        <input
          type="text"
          id="otp"
          class="otp-input"
          maxlength="6"
          placeholder="— — — — — —"
          inputmode="numeric"
          autocomplete="one-time-code"
          required
        >
      </div>
      <div class="otp-timer" id="otp-timer">Expires in <span id="otp-countdown">5:00</span></div>

      <button type="submit" class="btn-login" id="btn-otp" style="margin-top:18px;">
        <span class="btn-text">Verify OTP</span>
        <span class="spinner"></span>
      </button>
      <button type="button" class="btn-secondary" id="btn-back">← Back to sign in</button>
    </form>
  </div>

</div>

<div class="back-link">Don't have an account? <a href="register.html">Create one</a></div>
<div class="back-link" style="margin-top:10px;">← <a href="index.html">Back to public site</a></div>

<script>
  const API_BASE = ['localhost', '127.0.0.1'].includes(location.hostname)
    ? 'http://localhost:3000'
    : 'https://voltgrid-api-q2sf.onrender.com';

  // If already logged in, go straight to dashboard
  const existing = localStorage.getItem('vg_token');
  if (existing) {
    fetch(`${API_BASE}/api/me`, { headers: { 'Authorization': 'Bearer ' + existing } })
      .then(r => { if (r.ok) window.location.replace('dashboard.html'); })
      .catch(() => {});
  }

  let pendingUsername = null;
  let otpTimerInterval = null;

  // Password visibility toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggle-pw');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁️';
    }
  });

  // Step 1 — submit credentials
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');

    hideError();
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.otpRequired) {
        pendingUsername = data.username;
        showOtpStep(data.maskedEmail, data.devOtp);
      } else {
        showError(data.error || 'Invalid username or password');
      }
    } catch (err) {
      showError('Cannot connect to server. Is VoltGrid running?');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  // Step 2 — submit OTP
  document.getElementById('otp-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const otp = document.getElementById('otp').value.trim();
    const btn = document.getElementById('btn-otp');

    hideError();
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/api/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: pendingUsername, otp })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        clearInterval(otpTimerInterval);
        localStorage.setItem('vg_token', data.token);
        localStorage.setItem('vg_user', JSON.stringify({ username: data.username, role: data.role }));
        window.location.replace('dashboard.html');
      } else {
        showError(data.error || 'Invalid OTP. Please try again.');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    } catch (err) {
      showError('Cannot connect to server. Is VoltGrid running?');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  // Back button — return to Step 1
  document.getElementById('btn-back').addEventListener('click', () => {
    clearInterval(otpTimerInterval);
    pendingUsername = null;
    document.getElementById('otp-section').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('card-icon').textContent = '🔐';
    document.getElementById('card-title').textContent = 'Operator Sign In';
    document.getElementById('card-sub').textContent = 'Access your control dashboard';
    document.getElementById('otp').value = '';
    document.getElementById('password').value = '';
    hideError();
  });

  // Only allow digits in OTP field
  document.getElementById('otp').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
  });

  function showOtpStep(maskedEmail, devOtp) {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('otp-section').style.display = 'block';
    document.getElementById('card-icon').textContent = '📧';
    document.getElementById('card-title').textContent = 'Check Your Email';

    if (devOtp) {
      // Dev mode — show OTP directly on screen
      document.getElementById('otp-info').innerHTML =
        `<strong>Dev mode</strong> (no SMTP configured) — your OTP is: ` +
        `<span style="font-size:20px;font-weight:800;letter-spacing:4px;">${devOtp}</span>`;
      document.getElementById('card-sub').textContent = 'OTP shown below (dev mode)';
      // Auto-fill the OTP input
      document.getElementById('otp').value = devOtp;
    } else {
      document.getElementById('otp-email-display').textContent = maskedEmail;
      document.getElementById('card-sub').textContent = 'Enter the OTP we just sent you';
    }

    document.getElementById('otp').focus();
    startCountdown(5 * 60);
  }

  function startCountdown(seconds) {
    clearInterval(otpTimerInterval);
    const el = document.getElementById('otp-countdown');
    let remaining = seconds;
    function tick() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      if (remaining <= 0) {
        clearInterval(otpTimerInterval);
        el.textContent = 'Expired';
        document.getElementById('btn-otp').disabled = true;
        showError('OTP has expired. Please go back and sign in again.');
      }
      remaining--;
    }
    tick();
    otpTimerInterval = setInterval(tick, 1000);
  }

  function showError(msg) {
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').classList.add('show');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('show');
  }
</script>
</body>
</html>
