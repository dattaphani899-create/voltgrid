<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltGrid — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00E87A;
    --green-dim: #00b85f;
    --dark: #080E08;
    --dark2: #0f1a0f;
    --dark3: #162016;
    --card: #111a11;
    --border: rgba(0,232,122,0.15);
    --text: #e8f0e8;
    --muted: #7a9e7a;
    --white: #ffffff;
    --red: #FA383E;
    --red-bg: rgba(250,56,62,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background effects */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(0,232,122,0.06) 0%, transparent 70%);
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
  }

  /* Logo */
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    text-align: center;
  }
  .logo span { color: var(--green); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 40px;
  }

  /* Card */
  .login-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 40px 44px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 60px rgba(0,232,122,0.04);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* Form */
  .form-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--dark2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,232,122,0.1);
  }
  input::placeholder { color: var(--muted); }

  /* Password toggle */
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 2px;
    transition: color 0.15s;
  }
  .toggle-pw:hover { color: var(--text); }

  /* Error */
  .error-msg {
    display: none;
    background: var(--red-bg);
    border: 0.5px solid rgba(250,56,62,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
    align-items: center;
    gap: 8px;
  }
  .error-msg.show { display: flex; }

  /* Submit button */
  .btn-login {
    width: 100%;
    background: var(--green);
    color: var(--dark);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(0,232,122,0.2);
    margin-top: 8px;
    position: relative;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 50px rgba(0,232,122,0.35); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(8,14,8,0.3);
    border-top-color: var(--dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { opacity: 0.7; }

  /* Divider */
  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 28px 0 24px;
  }

  /* Demo credentials */
  .demo-hint {
    background: rgba(0,232,122,0.05);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .demo-hint strong { color: var(--green); font-weight: 600; }

  /* Back link */
  .back-link {
    margin-top: 28px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    position: relative; z-index: 1;
  }
  .back-link a {
    color: var(--green);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .back-link a:hover { opacity: 0.8; text-decoration: underline; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="logo">Volt<span>Grid</span></div>
<div class="tagline">Charge Point Operator Platform</div>

<div class="login-card">
  <div class="card-title">Sign in</div>
  <div class="card-sub">Access your operator dashboard</div>

  <div class="error-msg" id="error-msg">
    <span>⚠️</span>
    <span id="error-text">Invalid username or password</span>
  </div>

  <form id="login-form" autocomplete="on">
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">👁️</button>
      </div>
    </div>

    <div class="error-msg" id="error-inline" style="margin-top:0"></div>

    <button type="submit" class="btn-login" id="btn-login">
      <span class="btn-text">Sign in to Dashboard</span>
      <span class="spinner"></span>
    </button>
  </form>

  <hr class="divider">

  <div class="demo-hint">
    <strong>Demo credentials</strong><br>
    Username: <strong>admin</strong> &nbsp;·&nbsp; Password: <strong>admin123</strong>
  </div>
</div>

<div class="back-link">← <a href="index.html">Back to public site</a></div>

<script>
  // If already logged in, go straight to dashboard
  const existing = localStorage.getItem('vg_token');
  if (existing) {
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + existing } })
      .then(r => { if (r.ok) window.location.replace('dashboard.html'); })
      .catch(() => {});
  }

  // Password visibility toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggle-pw');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁️';
    }
  });

  // Login form submission
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    // Reset error
    errorMsg.classList.remove('show');

    // Loading state
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('vg_token', data.token);
        localStorage.setItem('vg_user', JSON.stringify({ username: data.username, role: data.role }));
        window.location.replace('dashboard.html');
      } else {
        showError(data.error || 'Invalid username or password');
      }
    } catch (err) {
      showError('Cannot connect to server. Is VoltGrid running?');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
</script>
</body>
</html>
